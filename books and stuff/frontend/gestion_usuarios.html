<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Usuarios</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper" style="width: 850px; text-align: left; color: white;">
    <h2 style="text-align: center;"> Control Operativo de Usuarios</h2>
    <br>
    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; width: 50%; font-size: 14px;">
            <h4 style="margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">+ Registrar Cuenta</h4>
            <input type="text" id="add-username" placeholder="Nombre de usuario" style="padding: 6px; margin-bottom: 8px; width: 100%; border-radius: 3px; border:none; background:rgba(255,255,255,0.2); color:#fff;">
            <input type="password" id="add-password" placeholder="Contraseña" style="padding: 6px; margin-bottom: 8px; width: 100%; border-radius: 3px; border:none; background:rgba(255,255,255,0.2); color:#fff;">
            <select id="add-tipo" style="padding: 6px; margin-bottom: 12px; width: 100%; border-radius: 3px; background:#333; color:#fff; border:none;">
                <option value="2">User (Normal)</option>
                <option value="1">Admin (Sistema)</option>
            </select>
            <button type="button" onclick="crearUsuario()" style="width:100%; padding:8px; background:#fff; color:#000;">Guardar Usuario</button>
        </div>

        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; width: 50%; font-size: 14px;">
            <h4 style="margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">✏ Modificar Parámetros</h4>
            <input type="text" id="mod-id" placeholder="ID del Usuario a modificar" style="padding: 6px; margin-bottom: 8px; width: 100%; border-radius: 3px; border:none; background:rgba(255,255,255,0.1); color:#ffeb3b; font-weight:700;">
            <input type="text" id="mod-username" placeholder="Nuevo nombre (opcional)" style="padding: 6px; margin-bottom: 8px; width: 100%; border-radius: 3px; border:none; background:rgba(255,255,255,0.2); color:#fff;">
            <input type="password" id="mod-password" placeholder="Nueva contraseña (opcional)" style="padding: 6px; margin-bottom: 8px; width: 100%; border-radius: 3px; border:none; background:rgba(255,255,255,0.2); color:#fff;">
            <select id="mod-tipo" style="padding: 6px; margin-bottom: 12px; width: 100%; border-radius: 3px; background:#333; color:#fff; border:none;">
                <option value="2">User (Normal)</option>
                <option value="1">Admin (Sistema)</option>
            </select>
            <button type="button" onclick="modificarUsuario()" style="width:100%; padding:8px; background:rgba(255,255,255,0.2); color:#fff; border:1px solid #fff;">Actualizar Registro</button>
        </div>
    </div>

    <div id="tabla-container" style="max-height: 170px; overflow-y: auto; padding-right: 5px; margin-top: 15px;">
        <table style="width:100%; border-collapse: collapse; font-size: 14px; color: white;">
            <tr style="border-bottom: 2px solid white; text-align: left;">
                <th style="padding: 8px;">ID</th>
                <th style="padding: 8px;">Nombre de Usuario</th>
                <th style="padding: 8px;">Rol de Cuenta</th>
                <th style="padding: 8px; text-align: center;">Acciones</th>
            </tr>
            <tbody id="usuarios-rows"></tbody>
        </table>
    </div>
    <br>
    <button type="button" onclick="window.location.href='admin.html'" style="width: 100%; background: none; color: white; border: 1px solid white;">Volver al Panel</button>
  </div>

  <script>
    const rowsContainer = document.getElementById("usuarios-rows");

    function cargarTabla() {
        fetch("http://127.0.0.1:8000/api/users")
            .then(res => res.json())
            .then(usuarios => {
                rowsContainer.innerHTML = "";
                usuarios.forEach(u => {
                    const rolTxt = u.tipo === 1 ? "Admin" : "User";
                    rowsContainer.innerHTML += `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.2); cursor:pointer;" onclick="seleccionarParaModificar(${u.id_usuario}, '${u.username}', ${u.tipo})">
                            <td style="padding: 8px;">${u.id_usuario}</td>
                            <td style="padding: 8px;">${u.username}</td>
                            <td><strong>${rolTxt}</strong></td>
                            <td style="padding: 8px; text-align: center;">
                                <button type="button" onclick="event.stopPropagation(); eliminarUsuario(${u.id_usuario})" style="background: rgba(220, 53, 69, 0.9); color: white; padding: 4px 10px; font-size: 12px; border:none; cursor:pointer; border-radius:3px;">Eliminar</button>
                            </td>
                        </tr> `;
                });
            });
    }

    window.seleccionarParaModificar = function(id, name, tipo) {
        document.getElementById("mod-id").value = id;
        document.getElementById("mod-username").value = "";
        document.getElementById("mod-password").value = "";
        document.getElementById("mod-tipo").value = tipo;
        document.getElementById("mod-username").placeholder = `Actual: ${name}`;
    }

    window.crearUsuario = function() {
        const username = document.getElementById("add-username").value.trim();
        const contrasena = document.getElementById("add-password").value.trim();
        const tipo = parseInt(document.getElementById("add-tipo").value);
        if (!username || !contrasena) return alert("Completa los campos de registro.");

        fetch("http://127.0.0.1:8000/api/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, contrasena, tipo })
        })
        .then(async res => {
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || "Error al crear");
            return data;
        })
        .then(data => {
            alert(data.message || "Usuario registrado");
            cargarTabla();
        }).catch(err => alert("Error: " + err.message));
    };

    window.modificarUsuario = function() {
        const id = document.getElementById("mod-id").value;
        const username = document.getElementById("mod-username").value.trim() || null;
        const contrasena = document.getElementById("mod-password").value.trim() || null;
        const tipo = parseInt(document.getElementById("mod-tipo").value);
        if (!id) return alert("Selecciona un usuario de la tabla primero.");

        // ALINEADO PERFECTAMENTE CON EL @app.put DEL BACKEND
        fetch(`http://127.0.0.1:8000/api/users/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, contrasena, tipo })
        })
        .then(async res => {
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || "Error al actualizar");
            return data;
        })
        .then(data => {
            alert(data.message || "Registro actualizado correctamente.");
            cargarTabla();
        }).catch(err => alert("Error: " + err.message));
    };

    window.eliminarUsuario = function(id) {
        if (!confirm(`¿Eliminar al usuario ID ${id}?`)) return;
        fetch(`http://127.0.0.1:8000/api/users/${id}`, { method: "DELETE" })
            .then(async res => {
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Error al eliminar");
                return data;
            })
            .then(data => {
                alert(data.message || "Usuario eliminado");
                cargarTabla();
            }).catch(err => alert("Error: " + err.message));
    };

    cargarTabla();
  </script>
</body>
</html>
