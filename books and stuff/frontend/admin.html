<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper" style="width: 500px;">
    <h2>Panel de Administración</h2>
    <br>

    <button type="button" id="btn-usuarios" style="margin-bottom: 15px; width: 100%;">Gestión de Usuarios</button>
    <button type="button" id="btn-sincronizar" style="margin-bottom: 15px; width: 100%;">Sincronizar API</button>
    <button type="button" id="btn-estadisticas" style="margin-bottom: 25px; width: 100%;">Ver Estadísticas</button>
    <button type="button" id="btn-cerrar" style="background: rgba(220, 53, 69, 0.8); width: 100%;">Cerrar Sesión</button>
  </div>

  <script>
    // Seguridad básica
    const usuarioSesion = JSON.parse(localStorage.getItem("usuario"));
    if (!usuarioSesion || usuarioSesion.tipo !== 1) {
        alert("Acceso denegado.");
        window.location.href = "login.html";
    }

    // Navegación modular por archivos
    document.getElementById("btn-usuarios").addEventListener("click", () => {
        window.location.href = "gestion_usuarios.html";
    });

    document.getElementById("btn-estadisticas").addEventListener("click", () => {
        window.location.href = "estadisticas.html";
    });

    // La sincronización al ser una acción directa, se puede quedar aquí con un aviso flotante
    document.getElementById("btn-sincronizar").addEventListener("click", function() {
        if (!confirm("¿Deseas descargar nuevos libros desde OpenLibrary?")) return;
        alert(" Sincronizando ");

        fetch("http://127.0.0.1:8000/books/sync", { method: "POST" })
            .then(res => res.json())
            .then(data => alert(data.message))
            .catch(() => alert("Error en el puente de sincronización."));
    });

    document.getElementById("btn-cerrar").addEventListener("click", () => {
        localStorage.removeItem("usuario");
        window.location.href = "login.html";
    });
  </script>
</body>
</html>
