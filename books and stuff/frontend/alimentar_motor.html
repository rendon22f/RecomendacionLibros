<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Configura tus gustos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste de ancho para que se vea como la imagen */
        .wrapper {
            width: 90% !important;
            max-width: 550px !important;
            padding: 30px !important;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Estilo para el buscador y select */
        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }

        select option {
            background: #333;
        }

        /* Lista de libros con scroll */
        #libros {
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
            padding-right: 10px;
            text-align: left;
        }

        /* Tarjeta de libro */
        .libro-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .libro-item h3 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .libro-item p {
            color: #ccc;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        /* Contenedor de estrellas y botón */
        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stars-container {
            display: flex;
            gap: 5px;
        }

        .star {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: color 0.2s;
        }

        .star.active {
            color: #ffb300; /* Dorado como la imagen */
        }

        .btn-guardar {
            padding: 6px 15px !important;
            font-size: 14px !important;
            width: auto !important;
        }

        /* Scrollbar minimalista */
        #libros::-webkit-scrollbar {
            width: 6px;
        }
        #libros::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <h1>Configura tus gustos</h1>

        <select id="generos">
            <option value="">Selecciona un género</option>
        </select>

        <button onclick="cargarLibros()">Buscar libros</button>

        <div id="libros">
            </div>

        <button onclick="terminarOnboarding()">Finalizar configuración</button>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem("usuario"));


        async function cargarGeneros() {
            try {
                const response = await fetch("http://127.0.0.1:8000/genres");
                const data = await response.json();
                const select = document.getElementById("generos");
                data.generos.forEach(g => {
                    const option = document.createElement("option");
                    option.value = g.genero;
                    option.textContent = g.genero;
                    select.appendChild(option);
                });
            } catch (error) {
                console.log(error);
            }
        }


        async function cargarLibros() {
            const genero = document.getElementById("generos").value;
            if (!genero) {
                alert("Selecciona un género");
                return;
            }

            try {
                const response = await fetch(`http://127.0.0.1:8000/onboarding/books/${genero}`);
                const data = await response.json();
                const contenedor = document.getElementById("libros");
                contenedor.innerHTML = "";

                data.libros.forEach(libro => {
                    const div = document.createElement("div");
                    div.className = "libro-item";
                    div.innerHTML = `
                        <h3>${libro.titulo}</h3>
                        <p>Autor: ${libro.autor}</p>
                        <div class="rating-row">
                            <div class="stars-container" id="stars-${libro.id_libro}" data-value="0">
                                <span class="star" onclick="setRating(${libro.id_libro}, 1)">★</span>
                                <span class="star" onclick="setRating(${libro.id_libro}, 2)">★</span>
                                <span class="star" onclick="setRating(${libro.id_libro}, 3)">★</span>
                                <span class="star" onclick="setRating(${libro.id_libro}, 4)">★</span>
                                <span class="star" onclick="setRating(${libro.id_libro}, 5)">★</span>
                            </div>
                            <button class="btn-guardar" onclick="prepararCalificacion(${libro.id_libro})">Guardar</button>
                        </div>
                    `;
                    contenedor.appendChild(div);
                });
            } catch (error) {
                console.log(error);
            }
        }


        function setRating(idLibro, valor) {
            const contenedor = document.getElementById(`stars-${idLibro}`);
            contenedor.setAttribute("data-value", valor);
            const estrellas = contenedor.querySelectorAll(".star");

            estrellas.forEach((s, index) => {
                if (index < valor) {
                    s.classList.add("active");
                } else {
                    s.classList.remove("active");
                }
            });
        }


        function prepararCalificacion(idLibro) {
            const contenedor = document.getElementById(`stars-${idLibro}`);
            const calificacion = contenedor.getAttribute("data-value");

            if (calificacion === "0") {
                alert("Por favor selecciona una estrella antes de guardar");
                return;
            }

            calificarLibro(idLibro, parseInt(calificacion));
        }


        async function calificarLibro(idLibro, calificacion) {
            try {
                const response = await fetch("http://127.0.0.1:8000/ratings", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        id_usuario: usuario.id_usuario,
                        id_libro: idLibro,
                        calificacion: calificacion
                    })
                });
                const data = await response.json();
                alert("Calificación guardada");
            } catch (error) {
                console.log(error);
            }
        }


        async function terminarOnboarding() {
            try {
                await fetch("http://127.0.0.1:8000/finish-onboarding", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id_usuario: usuario.id_usuario })
                });
                alert("Perfil configurado");
                window.location.href = "usuario.html";
            } catch (error) {
                console.log(error);
            }
        }

        cargarGeneros();
    </script>
</body>

</html>
