<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuario</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .wrapper { width: 95% !important; max-width: 980px !important; padding: 40px !important; }
        h2 { font-size: 2.2rem; text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5); text-align: center; margin-bottom: 30px; color: #fff; }
        #recomendaciones { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; max-height: 480px; overflow-y: auto; padding-right: 10px; }
        #recomendaciones div { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; padding: 20px; text-align: center; transition: transform 0.2s, background 0.2s; }
        #recomendaciones div:hover { transform: translateY(-4px); background: rgba(255, 255, 255, 0.18); }
        #recomendaciones div h3 { color: white; font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; }
        #recomendaciones div p { color: rgba(255, 255, 255, 0.85); font-size: 0.95rem; margin-bottom: 4px; }
        #recomendaciones hr { display: none; }
        .botones-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .botones-container button { width: auto; padding: 12px 30px; }
        #recomendaciones::-webkit-scrollbar { width: 6px; }
        #recomendaciones::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Tus recomendaciones</h2>
        <div id="recomendaciones"></div>
        <div class="botones-container">
            <button onclick="volverAAlimentar()">Volver a alimentar recomendaciones</button>
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem("usuario"));

        async function cargarRecomendaciones() {
            try {
                const response = await fetch(`http://127.0.0.1:8000/recommendations/${usuario.id_usuario}`);
                const data = await response.json();
                const contenedor = document.getElementById("recomendaciones");
                contenedor.innerHTML = "";

                data.recommendations.forEach(libro => {
                    const div = document.createElement("div");
                    div.innerHTML = `
                        <h3>${libro.titulo}</h3>
                        <p>${libro.autor}</p>
                        <p><i>${libro.genero}</i></p>
                        <hr>
                    `;
                    contenedor.appendChild(div);
                });
            } catch (error) { console.log(error); }
        }

        function volverAAlimentar() { window.location.href = "alimentar_motor.html"; }

        function cerrarSesion() {
            localStorage.removeItem("usuario");
            window.location.href = "login.html";
        }

        cargarRecomendaciones();
    </script>
</body>
</html>
